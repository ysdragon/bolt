baseURL: https://ysdragon.github.io/bolt/
locale: en-us
title: Bolt
description: A blazing-fast web framework for Ring

caches:
  images:
    dir: :cacheDir/images

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.png
      link: /
      width: 40
      height: 40

module:
  imports:
    - path: github.com/imfing/hextra

services:
  googleAnalytics:
    ID: G-C25NFCVN1J

menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
    - name: GitHub
      weight: 2
      url: "https://github.com/ysdragon/bolt"
      params:
        icon: github

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: dracula